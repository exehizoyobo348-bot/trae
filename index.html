<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>精灵兔大冒险 - Easy Mode</title>
    <style>
        :root {
            --rabbit-w: 100px;
            --rabbit-h: 100px;
            --sky-blue: #87CEEB;
            --grass-green: #2ecc71;
            --soil-brown: #795548;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0f172a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Press Start 2P', 'Segoe UI', cursive;
        }

        /* 昼夜交替背景 */
        #game-viewport {
            position: relative;
            width: 1000px;
            height: 500px;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
            border: 10px solid #1e293b;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            transition: background 10s ease;
        }

        #game-viewport.night {
            background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 100%);
        }

        /* 天体：太阳/月亮 */
        #celestial {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            top: 60px;
            right: 100px;
            background: #FFD700;
            box-shadow: 0 0 30px #FFD700;
            transition: all 10s ease;
            z-index: 0;
        }

        #game-viewport.night #celestial {
            background: #F0F0F0;
            box-shadow: 0 0 20px #F0F0F0;
            transform: translate(-100px, 300px);
        }

        /* 繁星背景 */
        #stars-container {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 5s ease;
            z-index: 0;
            pointer-events: none;
        }

        #game-viewport.night #stars-container {
            opacity: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: 0.3; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.2); }
        }

        /* 天气：雨点 */
        #weather-layer {
            position: absolute;
            inset: 0;
            z-index: 6;
            pointer-events: none;
            overflow: hidden;
        }

        .rain-drop {
            position: absolute;
            width: 2px;
            height: 15px;
            background: rgba(255, 255, 255, 0.4);
            animation: rainFall 0.5s linear infinite;
        }

        @keyframes rainFall {
            from { transform: translateY(-20px) rotate(15deg); }
            to { transform: translateY(520px) rotate(15deg); }
        }

        /* 技能特效 */
        .skill-fx {
            position: absolute;
            pointer-events: none;
            z-index: 11;
        }

        .dash-trail {
            width: 100px;
            height: 100px;
            background-image: url('image/sprite.png');
            background-size: 800px 200px;
            opacity: 0.5;
            z-index: 9;
            pointer-events: none;
            animation: fadeOut 0.4s forwards;
            image-rendering: pixelated;
        }

        @keyframes fadeOut {
            from { opacity: 0.5; transform: scale(1); }
            to { opacity: 0; transform: scale(1.2); }
        }

        /* 屏幕抖动 */
        .shake {
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* 能量条 */
        .energy-container {
            width: 200px;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
            position: relative;
        }

        #energy-fill {
            width: 100%;
            height: 100%;
            background: #38bdf8;
            transition: width 0.1s linear;
        }

        /* 狂暴模式特效 */
        #game-viewport.fever {
            animation: rainbowBg 1s infinite;
        }

        @keyframes rainbowBg {
            0% { border-color: #ff0000; box-shadow: 0 0 30px #ff0000; }
            33% { border-color: #00ff00; box-shadow: 0 0 30px #00ff00; }
            66% { border-color: #0000ff; box-shadow: 0 0 30px #0000ff; }
            100% { border-color: #ff0000; box-shadow: 0 0 30px #ff0000; }
        }

        .fever-rabbit {
            filter: hue-rotate(90deg) brightness(1.5) drop-shadow(0 0 15px #fff) !important;
        }

        /* 连击与分数浮动 */
        .floating-text {
            position: absolute;
            color: #fcd34d;
            font-weight: bold;
            pointer-events: none;
            z-index: 200;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 2px 2px 0 #000;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }

        /* 爆炸粒子 */
        .particle-burst {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fcd34d;
            border-radius: 50%;
            pointer-events: none;
            z-index: 150;
        }

        /* 视差背景层基类 */
        .parallax-layer {
            position: absolute;
            left: 0;
            width: 200%;
            height: 100%;
            will-change: transform;
            pointer-events: none;
        }

        /* 远景：云朵 */
        .layer-clouds {
            background: url('https://api.iconify.design/mdi:cloud.svg?color=white&alpha=0.4') repeat-x;
            background-size: 150px;
            top: 40px;
            height: 120px;
            opacity: 0.6;
            z-index: 1;
        }

        /* 中景：远山 */
        .layer-mountains {
            background: url('https://api.iconify.design/mdi:mountain.svg?color=%235c8e9d') repeat-x bottom;
            background-size: 300px 200px;
            height: 400px;
            bottom: 60px;
            opacity: 0.5;
            z-index: 2;
        }

        /* 装饰：树木 */
        .layer-trees {
            background: url('https://api.iconify.design/mdi:tree.svg?color=%231e3a1a') repeat-x bottom;
            background-size: 150px 180px;
            height: 180px;
            bottom: 60px;
            z-index: 3;
            opacity: 0.6;
            animation: sway 6s ease-in-out infinite alternate;
            transform-origin: bottom center;
        }

        /* 装饰：灌木 */
        .layer-bushes {
            background: url('https://api.iconify.design/mdi:leaf.svg?color=%232d5a27') repeat-x bottom;
            background-size: 80px 60px;
            height: 60px;
            bottom: 60px;
            z-index: 4;
            opacity: 0.9;
            animation: sway 3s ease-in-out infinite alternate-reverse;
            transform-origin: bottom center;
        }

        @keyframes sway {
            from { transform: skewX(-2deg); }
            to { transform: skewX(2deg); }
        }

        /* 飞鸟/蝙蝠 */
        .bird {
            position: absolute;
            width: 20px;
            height: 15px;
            background: url('https://api.iconify.design/mdi:bird.svg?color=black') no-repeat center;
            background-size: contain;
            z-index: 3;
            animation: fly linear infinite;
        }

        #game-viewport.night .bird {
            background: url('https://api.iconify.design/mdi:bat.svg?color=black') no-repeat center;
            background-size: contain;
        }

        @keyframes fly {
            from { transform: translateX(1100px) translateY(var(--y)); }
            to { transform: translateX(-100px) translateY(var(--y)); }
        }

        /* 近景：草地 */
        .layer-grass {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(to bottom, #2ecc71 0%, #27ae60 100%);
            z-index: 5;
            border-top: 4px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 -10px 20px rgba(0,0,0,0.2);
        }

        /* 前景：模糊草丛 */
        .layer-foreground {
            background: url('https://api.iconify.design/mdi:grass.svg?color=%231a4016') repeat-x bottom;
            background-size: 200px 100px;
            height: 100px;
            bottom: -20px;
            z-index: 100;
            opacity: 0.5;
            filter: blur(4px);
            width: 300%;
        }

        /* 角色阴影 */
        #shadow {
            position: absolute;
            width: 60px;
            height: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            bottom: 45px;
            left: 0;
            z-index: 9;
            transform: translateX(20px);
            transition: transform 0.1s linear, width 0.1s;
        }

        /* 尘土粒子 */
        .dust {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 8;
        }

        /* 精灵兔角色 */
        #player {
            position: absolute;
            width: var(--rabbit-w);
            height: var(--rabbit-h);
            bottom: 45px;
            left: 100px;
            background-image: url('image/sprite.png');
            background-size: 800px 200px;
            z-index: 10;
            image-rendering: pixelated;
            transition: transform 0.2s ease, filter 0.2s;
        }

        /* 动画类优化 */
        .anim-run-right { 
            animation: run 0.6s steps(8) infinite; 
            background-position-y: 0;
            transform: skewX(-5deg);
        }
        .anim-run-left { 
            animation: run 0.6s steps(8) infinite; 
            background-position-y: 100%;
            transform: skewX(5deg);
        }
        .anim-idle-right { background-position: 0 0; transform: scale(1); }
        .anim-idle-left { background-position: 0 100%; transform: scale(1); }
        
        .anim-jump-right { 
            background-position: -200px 0;
            transform: scale(0.95, 1.1);
        } 
        .anim-jump-left { 
            background-position: -200px 100%; 
            transform: scale(0.95, 1.1);
        }

        .dashing {
            transform: skewX(-15deg) scale(1.1, 0.9) !important;
            filter: brightness(1.5) drop-shadow(0 0 10px #38bdf8);
        }
        .anim-run-left.dashing { transform: skewX(15deg) scale(1.1, 0.9) !important; }

        @keyframes run {
            from { background-position-x: 0; }
            to { background-position-x: -800px; }
        }

        /* UI */
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #1e293b;
            text-transform: uppercase;
            font-size: 14px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hp-bar-container {
            width: 200px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }

        #hp-fill {
            width: 100%;
            height: 100%;
            background: #ef4444;
            transition: width 0.3s ease;
        }

        /* 物体层 */
        #object-layer {
            position: absolute;
            inset: 0;
            z-index: 8;
            pointer-events: none;
        }

        .game-object {
            position: absolute;
            z-index: 8;
            background-size: contain;
            background-repeat: no-repeat;
            transform-origin: center center;
        }

        .collectible {
            width: 40px;
            height: 40px;
            background-image: url('https://api.iconify.design/mdi:star.svg?color=%23fcd34d');
            animation: bounce 1s infinite alternate;
        }

        .magnet {
            width: 45px;
            height: 45px;
            background-image: url('https://api.iconify.design/mdi:magnet.svg?color=%2338bdf8');
            animation: pulse 0.5s infinite alternate;
            filter: drop-shadow(0 0 10px #38bdf8);
        }

        .shield {
            width: 45px;
            height: 45px;
            background-image: url('https://api.iconify.design/mdi:shield-check.svg?color=%23fbbf24');
            animation: pulse 0.5s infinite alternate;
            filter: drop-shadow(0 0 10px #fbbf24);
        }

        .clock {
            width: 45px;
            height: 45px;
            background-image: url('https://api.iconify.design/mdi:clock-outline.svg?color=%23a855f7');
            animation: pulse 0.5s infinite alternate;
            filter: drop-shadow(0 0 10px #a855f7);
        }

        .potion {
            width: 45px;
            height: 45px;
            background-image: url('https://api.iconify.design/mdi:bottle-tonic-plus.svg?color=%23ef4444');
            animation: pulse 0.5s infinite alternate;
            filter: drop-shadow(0 0 10px #ef4444);
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        /* 道具生效特效 */
        .magnet-active::after {
            content: "";
            position: absolute;
            inset: -20px;
            border: 2px dashed #38bdf8;
            border-radius: 50%;
            animation: rotate 2s linear infinite;
        }

        .shield-active::before {
            content: "";
            position: absolute;
            inset: -15px;
            border: 3px solid #fbbf24;
            border-radius: 50%;
            box-shadow: 0 0 15px #fbbf24;
            animation: pulse 0.3s infinite alternate;
            z-index: 11;
        }

        .slow-mo-active {
            filter: sepia(0.5) hue-rotate(260deg) !important;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .obstacle {
            width: 50px;
            height: 50px;
            background: #4b5563;
            clip-path: polygon(20% 0%, 80% 0%, 100% 40%, 90% 90%, 50% 100%, 10% 90%, 0% 40%);
            box-shadow: inset -5px -5px 0 rgba(0,0,0,0.3);
        }

        .obstacle::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.2) 50%);
            z-index: 1;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        /* 覆盖层 */
        .screen-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            z-index: 500;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(8px);
            color: white;
        }

        .btn-start {
            margin-top: 30px;
            padding: 15px 40px;
            background: #2ecc71;
            border: none;
            border-radius: 100px;
            color: white;
            font-family: inherit;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 10px 0 #27ae60;
            transition: all 0.1s;
        }

        .btn-start:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #27ae60;
        }

        .controls-info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 12px;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .mobile-controls {
            display: none;
            position: fixed;
            bottom: 30px;
            width: 100%;
            padding: 0 30px;
            justify-content: space-between;
            z-index: 1000;
        }

        .btn-circle {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            touch-action: none;
        }

        #error-card {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #ef4444;
        }

        @media (max-width: 768px) {
            #game-viewport { 
                width: 100vw; 
                height: 100vh; 
                border-width: 0; 
                border-radius: 0;
            }
            .mobile-controls { 
                display: flex; 
                bottom: 20px;
                padding: 0 20px;
            }
            .controls-info { display: none; }
            .btn-circle {
                width: 80px;
                height: 80px;
                background: rgba(255, 255, 255, 0.3);
                border: 3px solid rgba(255, 255, 255, 0.8);
                font-size: 28px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            }
            .ui-overlay {
                top: 10px;
                left: 10px;
                scale: 0.8;
                transform-origin: top left;
            }
        }
    </style>
</head>
<body>

    <div id="game-viewport">
        <div id="celestial"></div>
        <div id="stars-container"></div>
        <div id="weather-layer"></div>

        <div class="parallax-layer layer-clouds" id="clouds"></div>
        <div class="parallax-layer layer-mountains" id="mountains"></div>
        <div class="parallax-layer layer-trees" id="trees"></div>
        <div class="parallax-layer layer-bushes" id="bushes"></div>
        <div id="shadow"></div>
        <div id="player"></div>
        <div class="layer-grass"></div>
        <div class="parallax-layer layer-foreground" id="foreground"></div>
        <div id="object-layer"></div>

        <div class="ui-overlay">
            <div class="hp-bar-container"><div id="hp-fill"></div></div>
            <div class="energy-container"><div id="energy-fill"></div></div>
            <div id="score">SCORE: 0000</div>
            <div id="highscore" style="font-size: 10px; color: #64748b;">HI: 0000</div>
            <div id="combo-display" style="display: none; color: #fcd34d; font-size: 18px; margin-top: 5px;">COMBO x1</div>
            
            <!-- 道具状态进度条 -->
            <div id="powerup-bars" style="margin-top: 10px; display: flex; flex-direction: column; gap: 4px;">
                <div id="bar-magnet" style="display: none; width: 100px; height: 4px; background: #38bdf8; border-radius: 2px;"></div>
                <div id="bar-shield" style="display: none; width: 100px; height: 4px; background: #fbbf24; border-radius: 2px;"></div>
                <div id="bar-clock" style="display: none; width: 100px; height: 4px; background: #a855f7; border-radius: 2px;"></div>
            </div>
        </div>

        <div id="start-screen" class="screen-overlay">
            <h1 style="font-size: 40px;">精灵兔大冒险</h1>
            <p style="margin-top: 10px; color: #94a3b8;">简单模式已开启 - 轻松跑酷！</p>
            <button class="btn-start" onclick="startGame()">开始游戏</button>
        </div>

        <div id="gameover-screen" class="screen-overlay" style="display: none;">
            <h1 style="font-size: 40px; color: #ef4444;">游戏结束</h1>
            <p id="final-score" style="margin-top: 10px;"></p>
            <button class="btn-start" onclick="startGame()" style="background: #f59e0b;">重新挑战</button>
        </div>

        <div class="controls-info">
            <p><kbd>A</kbd> <kbd>D</kbd> 移动 | <kbd>SPACE</kbd> 跳跃 | <kbd>SHIFT</kbd> 冲刺</p>
        </div>

        <div id="error-card">
            <h2>⚠️ 精灵图加载失败</h2>
            <p>尝试路径: image/sprite.png</p>
            <button class="btn-start" onclick="forceStart()">跳过检查</button>
        </div>
    </div>

    <div class="mobile-controls">
        <div style="display: flex; gap: 20px;">
            <div class="btn-circle" id="btn-left">←</div>
            <div class="btn-circle" id="btn-right">→</div>
        </div>
        <div class="btn-circle" id="btn-jump">J</div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'jump') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'collect') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(); osc.stop(now + 0.2);
            } else if (type === 'powerup') {
                // 优化后的道具拾取音效：清脆的琶音上升感
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                osc.frequency.exponentialRampToValueAtTime(1760, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if (type === 'heal') {
                // 回血音效：温润的圆号感
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.exponentialRampToValueAtTime(659.25, now + 0.1); // E5
                osc.frequency.exponentialRampToValueAtTime(783.99, now + 0.2); // G5
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if (type === 'hit') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(10, now + 0.2);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.start(); osc.stop(now + 0.2);
            }
        }

        const player = document.getElementById('player'), shadow = document.getElementById('shadow'),
              clouds = document.getElementById('clouds'), mountains = document.getElementById('mountains'),
              trees = document.getElementById('trees'), bushes = document.getElementById('bushes'),
              foreground = document.getElementById('foreground'), scoreEl = document.getElementById('score'),
              hpFill = document.getElementById('hp-fill'), energyFill = document.getElementById('energy-fill'),
              objectLayer = document.getElementById('object-layer'), startScreen = document.getElementById('start-screen'),
              gameoverScreen = document.getElementById('gameover-screen'), errorCard = document.getElementById('error-card'),
              viewport = document.getElementById('game-viewport'), starsContainer = document.getElementById('stars-container'),
              weatherLayer = document.getElementById('weather-layer'),
              highscoreEl = document.getElementById('highscore'), comboEl = document.getElementById('combo-display'),
              barMagnet = document.getElementById('bar-magnet'), barShield = document.getElementById('bar-shield'),
              barClock = document.getElementById('bar-clock');

        const GRAVITY = 0.8, JUMP_FORCE = -15, ACCEL = 0.7, FRICTION = 0.88, MAX_SPEED = 4.5, DASH_SPEED = 12;
        let gameState = 'START', hp = 100, energy = 100, score = 0, posX = 100, posY = 0, velX = 0, velY = 0,
            isJumping = false, canDoubleJump = true, isDashing = false, facing = 'right',
            cloudPos = 0, mountainPos = 0, treePos = 0, bushPos = 0, fgPos = 0,
            gameObjects = [], spawnTimer = 0, gameTime = 0, starCount = 0, isFever = false, feverTimer = 0,
            isRaining = false, combo = 0, invulTimer = 0, magnetTimer = 0,
            shieldTimer = 0, slowMoTimer = 0, highScore = localStorage.getItem('sprite-rabbit-high-score') || 0;

        highscoreEl.innerText = `HI: ${Math.floor(highScore).toString().padStart(4, '0')}`;

        const keys = {};
        window.addEventListener('keydown', e => { if (e.code === 'ShiftLeft' || e.code === 'KeyK') handleDash(); keys[e.code] = true; });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // 移动端多点触控支持
        function setupMobileControls() {
            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');
            const btnJump = document.getElementById('btn-jump');

            const handleTouch = (btn, code, state) => {
                btn.addEventListener(state ? 'touchstart' : 'touchend', (e) => {
                    e.preventDefault();
                    keys[code] = state;
                    if (state && code === 'Space') {
                        // 触发跳跃逻辑
                        keys['Space'] = true;
                    }
                }, { passive: false });
            };

            handleTouch(btnLeft, 'KeyA', true);
            handleTouch(btnLeft, 'KeyA', false);
            handleTouch(btnRight, 'KeyD', true);
            handleTouch(btnRight, 'KeyD', false);
            handleTouch(btnJump, 'Space', true);
            handleTouch(btnJump, 'Space', false);
            
            // 增加长按冲刺支持 (移动端模拟)
            btnJump.addEventListener('touchstart', (e) => {
                const now = Date.now();
                if (now - btnJump.lastTap < 300) {
                    handleDash();
                }
                btnJump.lastTap = now;
            });
        }
        setupMobileControls();

        function handleDash() {
            if (gameState !== 'PLAYING' || isDashing || energy < 30) return;
            isDashing = true; energy -= 30; velX = (facing === 'right' ? 1 : -1) * DASH_SPEED;
            playSound('jump');
            setTimeout(() => isDashing = false, 200);
        }

        window.startGame = function() {
            gameState = 'PLAYING'; hp = 100; energy = 100; score = 0; posX = 100; posY = 0; velX = 0; velY = 0;
            gameTime = 0; starCount = 0; isFever = false; combo = 0; magnetTimer = 0; invulTimer = 0;
            shieldTimer = 0; slowMoTimer = 0;
            viewport.classList.remove('night', 'fever', 'slow-mo-active'); 
            player.classList.remove('fever-rabbit', 'magnet-active', 'shield-active');
            barMagnet.style.display = barShield.style.display = barClock.style.display = 'none';
            comboEl.style.display = 'none';
            gameObjects.forEach(obj => obj.el && obj.el.remove()); gameObjects = [];
            startScreen.style.display = 'none'; gameoverScreen.style.display = 'none';
            hpFill.style.width = '100%'; energyFill.style.width = '100%'; scoreEl.innerText = `SCORE: 0000`;
        };

        window.gameOver = function() {
            gameState = 'GAMEOVER'; playSound('hit');
            viewport.classList.add('shake'); setTimeout(() => viewport.classList.remove('shake'), 300);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('sprite-rabbit-high-score', highScore);
                highscoreEl.innerText = `HI: ${Math.floor(highScore).toString().padStart(4, '0')}`;
            }
            
            gameoverScreen.style.display = 'flex';
            document.getElementById('final-score').innerText = `最终得分: ${Math.floor(score)}`;
        };

        function createFloatingText(x, y, text, color = '#fcd34d') {
            const el = document.createElement('div'); el.className = 'floating-text';
            el.style.left = x + 'px'; el.style.bottom = y + 'px'; el.style.color = color; el.innerText = text;
            viewport.appendChild(el); setTimeout(() => el.remove(), 800);
        }

        function createBurst(x, y) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div'); p.className = 'particle-burst';
                p.style.left = x + 'px'; p.style.bottom = y + 'px';
                const angle = (i / 8) * Math.PI * 2, speed = 2 + Math.random() * 3, vx = Math.cos(angle) * speed, vy = Math.sin(angle) * speed;
                viewport.appendChild(p);
                let px = x, py = y, op = 1;
                const anim = setInterval(() => {
                    px += vx; py += vy; op -= 0.05; p.style.left = px + 'px'; p.style.bottom = py + 'px'; p.style.opacity = op;
                    if (op <= 0) { clearInterval(anim); p.remove(); }
                }, 20);
            }
        }

        function triggerFever() {
            isFever = true; feverTimer = 300; starCount = 0; playSound('collect');
            viewport.classList.add('fever'); player.classList.add('fever-rabbit');
            createFloatingText(posX, 200, 'FEVER MODE!', '#fff');
        }

        function initStars() {
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div'); star.className = 'star';
                star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 300 + 'px';
                const size = 1 + Math.random() * 3; star.style.width = size + 'px'; star.style.height = size + 'px';
                star.style.setProperty('--duration', (2 + Math.random() * 3) + 's'); starsContainer.appendChild(star);
            }
        }
        initStars();

        function spawnObject() {
            spawnTimer++;
            // --- 动态难度调整：由易变难 ---
            // 难度因子：随分数从 0 到 1 增长，10000分达到最大难度
            const difficultyFactor = Math.min(1, score / 10000); 
            // 初始生成间隔 160 (更慢)，最终缩短为 40 (更密集)
            const spawnRate = isFever ? 20 : Math.max(40, Math.floor(160 - (120 * difficultyFactor))); 
            
            if (spawnTimer % spawnRate === 0) {
                const rand = Math.random();
                // 随着难度增加，障碍物比例逐渐上升
                const obstacleThreshold = 0.6 + (0.15 * difficultyFactor); // 0.6 -> 0.75
                let type = rand > obstacleThreshold ? 'collectible' : 'obstacle'; 
                
                // 道具生成几率：前期更高 (6%)，后期逐渐降低 (2%)
                const itemThreshold = 0.94 + (0.04 * difficultyFactor);
                if (rand > itemThreshold) {
                    const items = ['magnet', 'shield', 'clock', 'potion'];
                    type = items[Math.floor(Math.random() * items.length)];
                }
                if (isFever) type = 'collectible';

                const el = document.createElement('div'); el.className = `game-object ${type}`;
                const obj = { el: el, type: type, x: 1000, y: (type !== 'obstacle') ? (100 + Math.random() * 250) : 45,
                              width: (type === 'obstacle' || type === 'collectible') ? 40 : 45, 
                              height: (type === 'obstacle' || type === 'collectible') ? 40 : 45 };
                objectLayer.appendChild(el); gameObjects.push(obj);
            }
        }

        function updateObjects() {
            // --- 动态速度调整：由易变难 ---
            // 速度因子：8000分时达到最大速度
            const speedFactor = Math.min(1, score / 8000);
            let currentSpeed = (isFever ? 10 : (3.5 + (6.5 * speedFactor)));
            if (slowMoTimer > 0) currentSpeed *= 0.5; // 时间减速效果

            for (let i = gameObjects.length - 1; i >= 0; i--) {
                const obj = gameObjects[i];
                if (obj.type === 'obstacle') {
                    if (!obj.rotation) obj.rotation = 0; obj.rotation -= currentSpeed * 2;
                    obj.el.style.transform = `rotate(${obj.rotation}deg)`;
                }
                if (magnetTimer > 0 && obj.type === 'collectible') {
                    const dx = posX + 50 - obj.x, dy = (45 - posY + 50) - obj.y, dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 400) { obj.x += dx * 0.15; obj.y += dy * 0.15; }
                }
                obj.x -= currentSpeed; obj.el.style.left = obj.x + 'px'; obj.el.style.bottom = obj.y + 'px';

                // --- 碰撞判定优化：更宽容的判定范围 ---
                const playerRect = { 
                    left: posX + 30, 
                    right: posX + 70, 
                    bottom: 45 - posY + 5, 
                    top: 135 - posY - 10 
                };
                const objRect = { 
                    left: obj.x + 5, 
                    right: obj.x + obj.width - 5, 
                    bottom: obj.y + 5, 
                    top: obj.y + obj.height - 5 
                };

                if (playerRect.left < objRect.right && playerRect.right > objRect.left && 
                    playerRect.bottom < objRect.top && playerRect.top > objRect.bottom) {
                    if (obj.type === 'collectible') {
                        combo++; 
                        if (combo > 1) {
                            comboEl.style.display = 'block';
                            comboEl.innerText = `COMBO x${combo}`;
                            comboEl.style.transform = 'scale(1.2)';
                            setTimeout(() => comboEl.style.transform = 'scale(1)', 100);
                        }
                        score += (isFever ? 200 : 100) * (1 + Math.floor(combo / 10));
                        energy = Math.min(100, energy + 15); starCount++; playSound('collect');
                        createBurst(obj.x + 20, obj.y + 20); createFloatingText(obj.x, obj.y + 40, `+${isFever?200:100}`);
                        if (starCount >= 5 && !isFever) triggerFever();
                    } else if (obj.type === 'magnet') {
                        magnetTimer = 300; player.classList.add('magnet-active'); 
                        createFloatingText(posX, 200, 'MAGNET!', '#38bdf8'); playSound('powerup');
                    } else if (obj.type === 'shield') {
                        shieldTimer = 300; player.classList.add('shield-active');
                        createFloatingText(posX, 200, 'SHIELD!', '#fbbf24'); playSound('powerup');
                    } else if (obj.type === 'clock') {
                        slowMoTimer = 300; viewport.classList.add('slow-mo-active');
                        createFloatingText(posX, 200, 'SLOW MOTION!', '#a855f7'); playSound('powerup');
                    } else if (obj.type === 'potion') {
                        hp = Math.min(100, hp + 20); hpFill.style.width = hp + '%';
                        createFloatingText(posX, 200, 'HEAL!', '#ef4444'); playSound('heal');
                    } else {
                        if (isFever || invulTimer > 0 || shieldTimer > 0) {
                            if (shieldTimer > 0) {
                                shieldTimer = 0; player.classList.remove('shield-active');
                                invulTimer = 60; // 护盾破碎给一点无敌时间
                                playSound('hit');
                            }
                            if (isFever) { score += 50; createBurst(obj.x+25, obj.y+25); playSound('collect'); }
                        } else {
                            // --- 动态伤害：前期扣血少 (15)，后期扣血多 (25) ---
                            const damage = 15 + Math.floor(10 * (Math.min(1, score / 10000)));
                            hp -= damage; combo = 0; invulTimer = 120; 
                            comboEl.style.display = 'none';
                            hpFill.style.width = hp + '%'; playSound('hit');
                            viewport.classList.add('shake'); setTimeout(() => viewport.classList.remove('shake'), 200);
                            player.style.filter = 'invert(1) brightness(2)';
                            if (hp <= 0) gameOver();
                        }
                    }
                    obj.el.remove(); gameObjects.splice(i, 1);
                } else if (obj.x < -100) { obj.el.remove(); gameObjects.splice(i, 1); }
            }
        }

        function createDust() {
            if (document.querySelectorAll('.dust').length > 10 || Math.abs(velX) < 2 || isJumping) return;
            const dust = document.createElement('div'); dust.className = 'dust';
            dust.style.left = (posX + (facing === 'right' ? 20 : 60)) + 'px'; dust.style.bottom = (45 + Math.random() * 5) + 'px';
            objectLayer.appendChild(dust);
            let dustY = 0, dustOpacity = 1;
            const anim = setInterval(() => {
                dustY += 1.5; dustOpacity -= 0.08; dust.style.transform = `translateY(-${dustY}px) scale(${1 + dustY/15})`;
                dust.style.opacity = dustOpacity; if (dustOpacity <= 0) { clearInterval(anim); if (dust.parentNode) dust.remove(); }
            }, 40);
        }

        function update() {
            if (gameState === 'PLAYING') {
                gameTime++;
                if (isFever) { feverTimer--; if (feverTimer <= 0) { isFever = false; viewport.classList.remove('fever'); player.classList.remove('fever-rabbit'); } }
                if (invulTimer > 0) { invulTimer--; player.style.opacity = (Math.floor(invulTimer / 5) % 2 === 0) ? "1" : "0.3"; if (invulTimer <= 0) { player.style.opacity = "1"; player.style.filter = ""; } }
                // 磁铁倒计时
                if (magnetTimer > 0) {
                    magnetTimer--;
                    barMagnet.style.display = 'block';
                    barMagnet.style.width = (magnetTimer / 3) + 'px';
                    if (magnetTimer <= 0) {
                        player.classList.remove('magnet-active');
                        barMagnet.style.display = 'none';
                    }
                }

                // 护盾倒计时
                if (shieldTimer > 0) {
                    shieldTimer--;
                    barShield.style.display = 'block';
                    barShield.style.width = (shieldTimer / 3) + 'px';
                    if (shieldTimer <= 0) {
                        player.classList.remove('shield-active');
                        barShield.style.display = 'none';
                    }
                }

                // 时间减速倒计时
                if (slowMoTimer > 0) {
                    slowMoTimer--;
                    barClock.style.display = 'block';
                    barClock.style.width = (slowMoTimer / 3) + 'px';
                    if (slowMoTimer <= 0) {
                        viewport.classList.remove('slow-mo-active');
                        barClock.style.display = 'none';
                    }
                }
                if (gameTime % 1800 === 900) viewport.classList.toggle('night');
                energy = Math.min(100, energy + (isFever ? 0.5 : 0.15)); energyFill.style.width = energy + '%';

                if (!isDashing) {
                    if (keys['KeyD'] || keys['ArrowRight']) { velX += ACCEL; facing = 'right'; }
                    else if (keys['KeyA'] || keys['ArrowLeft']) { velX -= ACCEL; facing = 'left'; }
                    velX *= FRICTION;
                }
                if (Math.abs(velX) < 0.1) velX = 0;
                if (!isDashing) velX = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, velX));

                if (keys['Space'] || keys['KeyW'] || keys['ArrowUp']) {
                    if (!isJumping) { velY = JUMP_FORCE; isJumping = true; canDoubleJump = true; playSound('jump'); keys['Space'] = keys['KeyW'] = keys['ArrowUp'] = false; }
                    else if (canDoubleJump) { velY = JUMP_FORCE * 0.8; canDoubleJump = false; playSound('jump'); keys['Space'] = keys['KeyW'] = keys['ArrowUp'] = false; }
                }

                velY += GRAVITY; posY += velY;
                if (posY > 0) { posY = 0; velY = 0; isJumping = false; }
                posX += velX; posX = Math.max(0, Math.min(900, posX));

                let animClass = isJumping ? (facing === 'right' ? 'anim-jump-right' : 'anim-jump-left') :
                               (Math.abs(velX) > 0.5 ? (facing === 'right' ? 'anim-run-right' : 'anim-run-left') :
                               (facing === 'right' ? 'anim-idle-right' : 'anim-idle-left'));
                
                player.style.animationDuration = `${Math.max(0.2, 1.2 - (Math.abs(velX) / (isFever ? 15 : MAX_SPEED)))}s`;
                player.className = animClass + (isDashing ? ' dashing' : '');
                player.style.left = posX + 'px'; player.style.bottom = (45 - posY) + 'px';

                shadow.style.left = posX + 'px';
                const shadowScale = 1 - (Math.abs(posY) / 200);
                shadow.style.transform = `translateX(20px) scale(${Math.max(0.4, shadowScale)})`;
                shadow.style.opacity = Math.max(0.1, shadowScale);

                const scrollBase = isFever ? 3 : 1;
                cloudPos -= (velX * 0.05 + scrollBase * 0.5);
                mountainPos -= (velX * 0.1 + scrollBase);
                treePos -= (velX * 0.2 + scrollBase * 2);
                bushPos -= (velX * 0.4 + scrollBase * 3);
                fgPos -= (velX * 0.8 + scrollBase * 5);
                
                clouds.style.backgroundPositionX = cloudPos + 'px';
                mountains.style.backgroundPositionX = mountainPos + 'px';
                trees.style.backgroundPositionX = treePos + 'px';
                bushes.style.backgroundPositionX = bushPos + 'px';
                foreground.style.backgroundPositionX = fgPos + 'px';
                
                score += isFever ? 1 : 0.2; scoreEl.innerText = `SCORE: ${Math.floor(score).toString().padStart(4, '0')}`;
                if (Math.abs(velX) > 0.5 && !isJumping && Math.random() > 0.8) createDust();
                spawnObject(); updateObjects();
            }
            requestAnimationFrame(update);
        }
        update();
        function forceStart() { errorCard.style.display = 'none'; }
    </script>
</body>
</html>
